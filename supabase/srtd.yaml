# SRTD Configuration for Kairo
# Schema Released To Developers - Live-reloading SQL templates

templateDir: supabase/migrations-templates
migrationDir: supabase/migrations
pgConnection: postgresql://postgres:postgres@localhost:54322/postgres
migrationPrefix: "srtd-"
migrationFilename: "$timestamp_$prefix$migrationName.sql"
wipIndicator: ".wip"
wrapInTransaction: true
filter: "**/*.sql"
banner: "/* Auto-generated by srtd. Edit the template, not this file. */"
footer: ""

# Functional area organization
# Templates are grouped by domain to keep migrations modular
functionalAreas:
  - auth           # User management, roles, auth helpers
  - signals        # Signal CRUD, source configurations
  - events         # Event handling, triggers
  - notifications   # Notification channels, delivery
  - audit          # Audit logging, changetracking
